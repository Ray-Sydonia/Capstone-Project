<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ColourChem — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#7c5cbf;--pl:#b07fd4;--pd:#5a3fa0;--accent:#e8a0c0;--bg:#f8f5ff;--surface:#fff;--s2:#f2ecff;--text:#1c1830;--muted:#7a7490;--border:#e0d6f5;--font-d:'Cormorant Garamond',serif;--font-b:'Outfit',sans-serif;--r:10px;--t:.22s ease}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;display:flex;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit} button{border:none;background:none;cursor:pointer;font-family:inherit}
input{font-family:inherit;border:none;outline:none}

.auth-page{display:flex;min-height:100vh;width:100%}

/* LEFT PANEL */
.auth-left{
  width:420px;flex-shrink:0;
  background:linear-gradient(155deg,#3d2b8a 0%,#6b45b5 40%,#9b6fd4 75%,#d4a0e0 100%);
  padding:3rem 2.5rem;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.auth-left::before{content:'';position:absolute;top:-40%;right:-40%;width:200%;height:200%;
  background:radial-gradient(ellipse,rgba(255,255,255,.07) 0%,transparent 60%);
  animation:orb 22s ease-in-out infinite;pointer-events:none}
.auth-left::after{content:'';position:absolute;bottom:-25%;left:-25%;width:160%;height:160%;
  background:radial-gradient(ellipse,rgba(232,160,192,.12) 0%,transparent 55%);
  animation:orb 30s ease-in-out infinite reverse;pointer-events:none}
@keyframes orb{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(25px,-30px) rotate(180deg)}}

.brand{position:relative;z-index:2;text-align:center;color:#fff;animation:fadeUp .7s ease .1s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.brand-logo{width:96px;height:96px;margin:0 auto 1.5rem;filter:drop-shadow(0 6px 20px rgba(0,0,0,.2))}
.brand-name{font-family:var(--font-d);font-size:2.9rem;font-weight:700;letter-spacing:-.02em;line-height:1;text-shadow:0 2px 12px rgba(0,0,0,.15)}
.brand-tag{font-size:.875rem;opacity:.8;margin:.35rem 0 2.5rem;font-weight:300;letter-spacing:.05em}
.brand-features{display:flex;flex-direction:column;gap:.55rem;text-align:left}
.bf{display:flex;align-items:center;gap:.7rem;padding:.55rem .9rem;background:rgba(255,255,255,.12);border-radius:8px;border:1px solid rgba(255,255,255,.14);font-size:.85rem;transition:var(--t)}
.bf:hover{background:rgba(255,255,255,.18);transform:translateX(4px)}
.bf-ic{font-size:1.05rem;flex-shrink:0}

/* RIGHT PANEL */
.auth-right{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 2rem}
.auth-box{width:100%;max-width:420px;animation:fadeUp .7s ease .2s both}

.form-title{font-family:var(--font-d);font-size:2.5rem;font-weight:600;color:var(--text);line-height:1}
.form-sub{color:var(--muted);font-size:.9rem;margin:.4rem 0 2rem}

.alert{padding:.7rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;display:none}
.alert-error{background:#fff0f3;border:1px solid #ffc0cb;color:#c0392b}

.fg{margin-bottom:1.15rem}
.fg label{display:block;font-size:.82rem;font-weight:500;margin-bottom:.38rem;color:var(--text)}
.fg input{
  width:100%;padding:.78rem 1rem;background:var(--s2);
  border:2px solid transparent;border-radius:var(--r);font-size:.9rem;
  color:var(--text);transition:var(--t);
}
.fg input:focus{background:var(--surface);border-color:var(--primary);box-shadow:0 0 0 4px rgba(124,92,191,.1)}
.fg input::placeholder{color:#ccc}

.form-opts{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.check-lbl{display:flex;align-items:center;gap:.45rem;font-size:.85rem;cursor:pointer;color:var(--muted)}
.check-lbl input[type=checkbox]{width:15px;height:15px;accent-color:var(--primary)}
.lnk{color:var(--primary);font-size:.85rem;font-weight:500;transition:var(--t)}
.lnk:hover{color:var(--pd)}

.btn-primary{
  width:100%;padding:.88rem;display:flex;align-items:center;justify-content:center;gap:.5rem;
  background:linear-gradient(135deg,var(--pd),var(--primary),var(--pl));
  color:#fff;border-radius:var(--r);font-size:.95rem;font-weight:500;
  box-shadow:0 4px 16px rgba(124,92,191,.32);transition:var(--t);cursor:pointer;border:none;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(124,92,191,.42)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.65;cursor:not-allowed;transform:none}
.btn-primary .arrow{transition:var(--t)}
.btn-primary:hover .arrow{transform:translateX(4px)}

.btn-google{
  width:100%;padding:.82rem;display:flex;align-items:center;justify-content:center;gap:.6rem;
  background:var(--surface);border:2px solid var(--border);border-radius:var(--r);
  font-size:.9rem;font-weight:500;color:var(--text);transition:var(--t);cursor:pointer;
}
.btn-google:hover{border-color:var(--primary);background:var(--s2)}

.divider{display:flex;align-items:center;gap:.9rem;margin:1.5rem 0;color:var(--muted);font-size:.82rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.auth-footer{text-align:center;margin-top:1.5rem;font-size:.85rem;color:var(--muted)}

@media(max-width:768px){.auth-left{display:none}}
</style>
</head>
<body class="auth-page">

<!-- LEFT -->
<div class="auth-left">
  <div class="brand">
    <div class="brand-logo">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" fill="none">
        <defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="rgba(255,255,255,.95)"/><stop offset="100%" stop-color="rgba(255,255,255,.6)"/></linearGradient></defs>
        <path d="M60 18 Q78 26 84 50 Q88 64 84 80 Q80 96 68 108 Q64 112 60 116" stroke="url(#g1)" stroke-width="4.5" stroke-linecap="round"/>
        <path d="M60 18 Q42 26 36 50 Q32 64 36 80 Q40 96 52 108 Q56 112 60 116" stroke="url(#g1)" stroke-width="4.5" stroke-linecap="round"/>
        <path d="M50 23 Q42 34 40 50 Q38 62 42 74" stroke="rgba(255,255,255,.5)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M70 23 Q78 34 80 50 Q82 62 78 74" stroke="rgba(255,255,255,.5)" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="60" cy="13" r="7.5" fill="url(#g1)"/>
      </svg>
    </div>
    <div class="brand-name">ColourChem</div>
    <div class="brand-tag">Professional Hair Color Chemistry</div>
    <div class="brand-features">
      <div class="bf"><span class="bf-ic">🎨</span><span>AI-Powered Color Mixing</span></div>
      <div class="bf"><span class="bf-ic">🧪</span><span>Strand Damage Prediction</span></div>
      <div class="bf"><span class="bf-ic">👥</span><span>Multi-Client Management</span></div>
      <div class="bf"><span class="bf-ic">💾</span><span>Formula Archive</span></div>
    </div>
  </div>
</div>

<!-- RIGHT -->
<div class="auth-right">
  <div class="auth-box">
    <h1 class="form-title">Welcome Back</h1>
    <p class="form-sub">Sign in to continue your colour journey</p>
    <div class="alert alert-error" id="errMsg"></div>
    <div class="fg"><label>Email Address</label><input type="email" id="email" placeholder="your.email@example.com"></div>
    <div class="fg"><label>Password</label><input type="password" id="password" placeholder="Enter your password"></div>
    <div class="form-opts">
      <label class="check-lbl"><input type="checkbox" id="rem"><span>Remember me</span></label>
      <a href="#" class="lnk">Forgot password?</a>
    </div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">
      <span>Sign In</span>
      <svg class="arrow" width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9h12M15 9l-4.5-4.5M15 9l-4.5 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="divider"><span>or</span></div>
    <button class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18"><path d="M16.5 9.2c0-.6-.06-1.2-.17-1.7H9v3.2h4.2c-.18 1-.74 1.85-1.56 2.42v2h2.52c1.48-1.36 2.34-3.37 2.34-5.92z" fill="#4285F4"/><path d="M9 17c2.16 0 3.97-.72 5.3-1.94l-2.53-1.96c-.7.47-1.61.75-2.77.75-2.13 0-3.93-1.44-4.58-3.37H1.83v2.03C3.13 15.32 5.88 17 9 17z" fill="#34A853"/><path d="M4.42 10.48A5.09 5.09 0 0 1 4.1 9c0-.51.09-1 .32-1.48V5.49H1.83A8.03 8.03 0 0 0 1 9c0 1.3.3 2.53.83 3.51l2.59-2.03z" fill="#FBBC05"/><path d="M9 3.58c1.2 0 2.27.41 3.12 1.22l2.32-2.33C12.96 1.17 11.15.4 9 .4 5.88.4 3.13 2.08 1.83 4.59L4.42 6.62C5.07 4.7 6.87 3.58 9 3.58z" fill="#EA4335"/></svg>
      <span>Continue with Google</span>
    </button>
    <p class="auth-footer">Don't have an account? <a href="signup.html" class="lnk" style="font-weight:600">Create account</a></p>
  </div>
</div>

<script>
if(JSON.parse(localStorage.getItem('cc_user')||'null')?.loggedIn) location.href='dashboard.html';
function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('password').value;
  const err=document.getElementById('errMsg');
  const btn=document.getElementById('loginBtn');
  err.style.display='none';
  if(!email||!pw){err.textContent='Please fill in all fields.';err.style.display='block';return}
  btn.innerHTML='<span>Signing in…</span>';btn.disabled=true;
  setTimeout(()=>{
    localStorage.setItem('cc_user',JSON.stringify({email,name:email.split('@')[0],loggedIn:true,ts:Date.now()}));
    location.href='dashboard.html';
  },850);
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script>
</body>
</html>

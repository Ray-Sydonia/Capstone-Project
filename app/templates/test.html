<!DOCTYPE html>
<html>
<head>
  <title>AI Upload Test</title>
</head>
<body>

  <h2>Test Hair Damage Prediction</h2>

  <form id="uploadForm">
    <input type="file" id="image" required /><br><br>

    <label>Porosity:</label>
    <select id="porosity">
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select><br><br>

    <label>Texture:</label>
    <select id="texture">
      <option value="straight">Straight</option>
      <option value="wavy">Wavy</option>
      <option value="curly">Curly</option>
    </select><br><br>

    <label>Chemical History:</label><br>
    <textarea id="chem_history"></textarea><br><br>

    <button type="submit">Analyze</button>
  </form>

  <h3>Result:</h3>
  <pre id="result"></pre>

  <script>
    document.getElementById("uploadForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const file = document.getElementById("image").files[0];

      const formData = new FormData();
      formData.append("hair_image", file);

      // send hair data as JSON string
      formData.append("hair_data", JSON.stringify({
        porosity: document.getElementById("porosity").value,
        texture: document.getElementById("texture").value,
        chem_history: document.getElementById("chem_history").value
      }));

      const res = await fetch("http://localhost:5000/analyze-damage", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      document.getElementById("result").innerText = JSON.stringify(data, null, 2);
    });
  </script>

</body>
</html>
